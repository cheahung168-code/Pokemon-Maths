<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math-Strike: Elemental Wingman</title>
    <style>
        :root { --hull-green: #0f0; --danger: #f00; --radar-bg: rgba(0, 15, 0, 0.9); }
        * { touch-action: manipulation; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace; background: #000; 
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; color: #fff; overflow: hidden;
        }
        body.day { --sky: #4facfe; }
        body.night { --sky: #090909; }
        #top-bar {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            background: #111; padding: 10px 15px; font-size: 14px; border-bottom: 2px solid #333;
        }
        #game-box { width: 100%; max-width: 500px; flex-grow: 1; background: #fff; display: flex; flex-direction: column; position: relative; }
        #battle-screen { flex: 1.8; position: relative; overflow: hidden; background-color: var(--sky); transition: background-color 2s; }
        #timer-bar { position: absolute; top:0; left:0; height:6px; width: 100%; background: #ffcc00; z-index: 30; }
        
        .jet-container { position: absolute; width: 110px; height: 110px; z-index: 5; }
        .jet-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.5)); }
        #opp-pos { top: 15%; right: 10%; animation: patrolOpp 8s infinite ease-in-out; }
        #play-pos { bottom: 15%; left: 10%; animation: patrolPlay 9s infinite ease-in-out; }
        @keyframes patrolOpp { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-50px, 40px); } }
        @keyframes patrolPlay { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(50px, -40px); } }
        
        /* ELEMENTAL ATTACK STYLING */
        #attack-fx { 
            position: absolute; font-size: 50px; display: none; z-index: 200; 
            transition: all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            text-shadow: 0 0 15px white; pointer-events: none;
        }

        .radar-card { position: absolute; background: var(--radar-bg); color: #0f0; padding: 5px 10px; width: 140px; border: 1px solid #0f0; border-radius: 4px; z-index: 10; font-size: 10px; }
        #opp-stats { top: 5%; left: 5%; } #play-stats { bottom: 5%; right: 5%; }
        .hull-outer { height: 4px; background: #222; margin-top: 4px; border: 1px solid #0f0; }
        .hull-inner { height: 100%; background: #0f0; width: 100%; transition: width 0.5s; }
        
        #ui-panel { flex: 1.1; background: #111; padding: 10px; display: flex; flex-direction: column; justify-content: center; border-top: 4px solid #333; }
        #question { font-size: 40px; font-weight: bold; text-align: center; margin-bottom: 8px; color: #fff; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 130px; }
        .ans-btn { font-size: 24px; font-weight: bold; border: 2px solid #0f0; border-radius: 8px; background: #222; color: #0f0; }
        .ans-btn:active { background: #0f0; color: #000; }

        #input-area { display: none; flex-direction: column; align-items: center; gap: 5px; }
        #user-input { width: 85%; font-size: 28px; text-align: center; border: 2px solid #0f0; background: #000; color: #0f0; padding: 5px; margin-bottom: 5px; }
        .numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; width: 100%; }
        .num-btn { padding: 14px; background: #333; border: 1px solid #666; color: white; border-radius: 4px; font-weight: bold; font-size: 18px; }
        
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; text-align: center; padding: 20px; }
        .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; width: 100%; }
        .lvl-btn { padding: 12px 5px; background: #111; color: #fff; border: 1px solid #0f0; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .challenge-badge { border-color: #f00 !important; color: #f44; }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translate(0,0);} 25%{transform:translate(-8px,8px);} 75%{transform:translate(8px,-8px);} }
    </style>
</head>
<body class="day">
<div id="top-bar">
    <div id="lvl-info">Unit: Strike-Wing</div>
    <div id="time-text">--</div>
    <div class="top-btns">
        <button onclick="showMenu()" style="padding:4px; font-size:10px; background:#333; color:white; border:1px solid #777;">AIRSPACE</button>
        <button onclick="resetSave()" style="padding:4px; font-size:10px; background:#333; color:white; border:1px solid #777;">RESET</button>
    </div>
</div>

<div id="game-box">
    <div id="battle-screen">
        <div id="timer-bar"></div>
        <div id="attack-fx">⚡</div>
        
        <div id="overlay">
            <div id="overlay-content">
                <h2 style="color:#0f0; letter-spacing: 2px;">ELEMENTAL MISSION</h2>
                <div class="level-grid" id="selector"></div>
            </div>
            <div id="result-box" style="display:none">
                <div id="result-icon" style="font-size:60px"></div>
                <h1 id="over-title" style="color:white; margin:10px 0;"></h1>
                <p id="over-sub" style="color:#0f0; font-family: monospace;"></p>
                <button onclick="startLevel()" style="background:#005500; color:white; padding:15px 40px; border:1px solid #0f0; border-radius:4px; font-weight:bold;">NEXT DEPLOYMENT</button>
            </div>
        </div>

        <div id="opp-stats" class="radar-card">BOGEY: <span id="opp-name">FLANKER</span><div class="hull-outer"><div id="opp-hp" class="hull-inner"></div></div></div>
        <div id="opp-pos" class="jet-container"><img id="opp-img" class="jet-img" src=""></div>

        <div id="play-stats" class="radar-card">PLAYER: <span id="play-name">...</span><br>RANK: <span id="p-rank">LT</span><div class="hull-outer"><div id="play-hp" class="hull-inner"></div></div></div>
        <div id="play-pos" class="jet-container"><img id="play-img" class="jet-img" src=""></div>
    </div>

    <div id="ui-panel">
        <div id="question">--</div>
        <div class="grid" id="mc-area">
            <button class="ans-btn" onclick="handleAns(this.innerText)">?</button>
            <button class="ans-btn" onclick="handleAns(this.innerText)">?</button>
            <button class="ans-btn" onclick="handleAns(this.innerText)">?</button>
            <button class="ans-btn" onclick="handleAns(this.innerText)">?</button>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" readonly placeholder="DATA LINK...">
            <div class="numpad">
                <button class="num-btn" onclick="press('1')">1</button><button class="num-btn" onclick="press('2')">2</button><button class="num-btn" onclick="press('3')">3</button><button class="num-btn" style="background:#500" onclick="press('C')">C</button>
                <button class="num-btn" onclick="press('4')">4</button><button class="num-btn" onclick="press('5')">5</button><button class="num-btn" onclick="press('6')">6</button><button class="num-btn" onclick="press('0')">0</button>
                <button class="num-btn" onclick="press('7')">7</button><button class="num-btn" onclick="press('8')">8</button><button class="num-btn" onclick="press('9')">9</button><button class="num-btn" style="background:#050;" onclick="handleAns(document.getElementById('user-input').value)">STRIKE</button>
            </div>
        </div>
    </div>
</div>

<script>
    const POKEMON = [
        {lvl: 1, id: 25, name: "PIKACHU", element: "⚡", freq: 800},
        {lvl: 3, id: 1, name: "BULBASAUR", element: "🍃", freq: 400},
        {lvl: 5, id: 4, name: "CHARMANDER", element: "🔥", freq: 200},
        {lvl: 7, id: 7, name: "SQUIRTLE", element: "💧", freq: 600},
        {lvl: 9, id: 94, name: "GENGAR", element: "🔮", freq: 150},
        {lvl: 11, id: 143, name: "SNORLAX", element: "🪨", freq: 100},
        {lvl: 13, id: 448, name: "LUCARIO", element: "👊", freq: 300},
        {lvl: 15, id: 130, name: "GYARADOS", element: "🌊", freq: 450},
        {lvl: 17, id: 149, name: "DRAGONITE", element: "💨", freq: 700},
        {lvl: 19, id: 150, name: "MEWTWO", element: "✨", freq: 900},
        {lvl: 20, id: 384, name: "RAYQUAZA", element: "🌌", freq: 50}
    ];

    let AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audio = null;
    let bgm = null;

    function initAudio() {
        if (audio) return;
        audio = new AudioCtx();
        bgm = audio.createOscillator();
        let gain = audio.createGain();
        bgm.type = 'triangle';
        bgm.frequency.setValueAtTime(50, audio.currentTime);
        gain.gain.setValueAtTime(0.02, audio.currentTime);
        bgm.connect(gain); gain.connect(audio.destination);
        bgm.start();
    }

    function playSfx(freq, type, dur, vol=0.1) {
        if (!audio) return;
        let osc = audio.createOscillator();
        let g = audio.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audio.currentTime);
        g.gain.setValueAtTime(vol, audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + dur);
        osc.connect(g); g.connect(audio.destination);
        osc.start(); osc.stop(audio.currentTime + dur);
    }

    let state = { lvl: 1, qIdx: 0, correct: 0, ans: 0, player: { hp: 3 }, opp: { hp: 3 }, timerId: null, levelQuestions: new Set(), currentElement: "⚡" };

    function buildMenu() {
        const sel = document.getElementById('selector'); sel.innerHTML = '';
        for(let i=1; i<=20; i++) {
            const btn = document.createElement('button'); 
            btn.innerText = i; 
            btn.className = 'lvl-btn' + (i % 5 === 0 ? ' challenge-badge' : '');
            btn.onclick = () => { initAudio(); state.lvl = i; startLevel(); };
            sel.appendChild(btn);
        }
    }
    buildMenu();

    function updateSprites() {
        const pData = [...POKEMON].reverse().find(p => state.lvl >= p.lvl) || POKEMON[0];
        state.currentElement = pData.element;
        state.elementFreq = pData.freq;
        document.getElementById('play-img').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pData.id}.png`;
        document.getElementById('play-name').innerText = pData.name;
        document.getElementById('opp-img').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${(151 - state.lvl)}.png`;
        document.getElementById('p-rank').innerText = state.lvl >= 20 ? "CHAMPION" : "ACE";
        document.getElementById('play-hp').style.width = (state.player.hp/3*100) + "%";
        document.getElementById('opp-hp').style.width = (state.opp.hp/3*100) + "%";
    }

    function generateMath() {
        let a, b, op, qStr;
        const isChallenge = (state.lvl % 5 === 0);
        document.getElementById('mc-area').style.display = isChallenge ? 'none' : 'grid';
        document.getElementById('input-area').style.display = isChallenge ? 'flex' : 'none';
        document.getElementById('user-input').value = '';

        do {
            op = Math.random() > 0.5 ? 0 : 1;
            if (state.lvl <= 5) { a = Math.floor(Math.random()*15)+1; b = Math.floor(Math.random()*15)+1; }
            else { a = Math.floor(Math.random()*90)+10; b = Math.floor(Math.random()*90)+10; }
            if (op === 1 && a < b) [a, b] = [b, a];
            state.ans = op === 0 ? a + b : a - b;
            qStr = `${a}${op === 0 ? '+' : '-'}${b}`;
        } while (state.levelQuestions.has(qStr) || state.ans <= 0);

        state.levelQuestions.add(qStr);
        document.getElementById('question').innerText = qStr;

        if(!isChallenge) {
            let opts = [state.ans];
            while(opts.length < 4) {
                let offset = (Math.floor(Math.random()*3) - 1) * 10;
                if (offset === 0) offset = Math.random() > 0.5 ? 10 : -10;
                let fake = state.ans + offset;
                if(fake > 0 && !opts.includes(fake)) opts.push(fake);
                else opts.push(state.ans + (opts.length * 7)); 
            }
            opts.sort(() => Math.random() - 0.5);
            document.querySelectorAll('.ans-btn').forEach((btn, i) => { btn.innerText = opts[i]; btn.disabled = false; });
        }
    }

    function launchAttack(isPlayer) {
        const fx = document.getElementById('attack-fx');
        const screen = document.getElementById('battle-screen').getBoundingClientRect();
        const startEl = document.getElementById(isPlayer ? 'play-pos' : 'opp-pos').getBoundingClientRect();
        const endEl = document.getElementById(isPlayer ? 'opp-pos' : 'play-pos').getBoundingClientRect();

        // Use element based on current Pokemon
        fx.innerText = isPlayer ? state.currentElement : "🌑";
        
        // Attack Sound
        playSfx(isPlayer ? state.elementFreq : 120, isPlayer ? 'sine' : 'sawtooth', 0.8, 0.2);

        fx.style.display = 'block';
        fx.style.transition = 'none';
        fx.style.left = (startEl.left - screen.left + 40) + 'px'; 
        fx.style.top = (startEl.top - screen.top + 40) + 'px';
        fx.style.transform = 'scale(1)';

        setTimeout(() => {
            fx.style.transition = 'all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            fx.style.left = (endEl.left - screen.left + 40) + 'px'; 
            fx.style.top = (endEl.top - screen.top + 40) + 'px';
            fx.style.transform = 'scale(2) rotate(360deg)';
        }, 50);

        setTimeout(() => {
            fx.style.display = 'none';
            playSfx(60, 'square', 0.4, 0.3); // Impact
            const target = isPlayer ? 'opp-pos' : 'play-pos';
            document.getElementById(target).classList.add('shake');
            if(isPlayer) state.opp.hp -= 0.5; else state.player.hp--;
            updateSprites();
            setTimeout(() => {
                document.getElementById(target).classList.remove('shake');
                if(state.player.hp <= 0) endBattle(false); else nextQ();
            }, 500);
        }, 750);
    }

    function handleAns(val) {
        if(!val) return; 
        clearInterval(state.timerId);
        const isRight = parseInt(val) === state.ans;
        if(isRight) {
            state.correct++; 
            playSfx(1000, 'sine', 0.05, 0.1);
        }
        launchAttack(isRight);
    }

    function startLevel() {
        document.getElementById('overlay').style.display = 'none';
        state.qIdx = 0; state.correct = 0; state.player.hp = 3; state.opp.hp = 3;
        state.levelQuestions.clear(); updateSprites(); nextQ();
        document.body.className = (new Date().getHours() > 6 && new Date().getHours() < 19) ? 'day' : 'night';
    }

    function nextQ() {
        state.qIdx++;
        if(state.qIdx > 10) return endBattle(true);
        document.getElementById('lvl-info').innerText = `Msn:${state.lvl} (${state.qIdx}/10)`;
        generateMath(); startTimer();
    }

    function startTimer() {
        let max = (state.lvl % 5 === 0) ? 35 : 20;
        let left = max; clearInterval(state.timerId);
        state.timerId = setInterval(() => {
            left--; document.getElementById('time-text').innerText = left + "s";
            document.getElementById('timer-bar').style.width = (left/max*100) + "%";
            if(left <= 0) { clearInterval(state.timerId); launchAttack(false); }
        }, 1000);
    }

    function endBattle(win) {
        clearInterval(state.timerId);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('overlay-content').style.display = 'none';
        const box = document.getElementById('result-box'); box.style.display = 'block';
        const icon = document.getElementById('result-icon');
        
        if(win) {
            icon.innerText = "🎖️";
            document.getElementById('over-title').innerText = "MISSION SUCCESS";
            if(state.lvl === 20) {
                icon.innerText = "👑";
                document.getElementById('over-title').innerText = "GRAND CHAMPION";
                [261, 329, 392, 523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playSfx(f, 'square', 0.5, 0.1), i * 200));
            } else { playSfx(600, 'sine', 0.5); }
            if (state.lvl < 20) state.lvl++;
        } else {
            icon.innerText = "⚠️"; 
            document.getElementById('over-title').innerText = "WINGMAN DOWN";
            playSfx(100, 'sawtooth', 0.8, 0.2);
        }
        document.getElementById('over-sub').innerText = `TARGETS HIT: ${state.correct}/10`;
    }

    function showMenu() { clearInterval(state.timerId); buildMenu(); document.getElementById('overlay').style.display = 'flex'; document.getElementById('overlay-content').style.display = 'block'; document.getElementById('result-box').style.display = 'none'; }
    function press(v) { const i = document.getElementById('user-input'); if(v==='C') i.value=''; else if(i.value.length < 5) i.value+=v; }
    function resetSave() { if(confirm("Return to Hangar?")) { showMenu(); } }
</script>
</body>
</html>
